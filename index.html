<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font_lttl3-Regular - Font Showcase & Canvas Generator</title>
    <style>
        /* -----------------------------------------
         * デザインシステム & 変数定義
         * ----------------------------------------- */
        :root {
            --bg-primary: #0a0e17;      /* 宇宙や深海を思わせる深いネイビー */
            --bg-secondary: #131c2e;    /* コントロールパネルの背景 */
            --bg-tertiary: #1e293b;     /* 入力フォームの背景 */
            --accent-color: #6366f1;    /* 神秘的なバイオレットブルー */
            --accent-hover: #4f46e5;
            --accent-green: #10b981;    /* 保存ボタンなどのポジティブカラー */
            --accent-green-hover: #059669;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* -----------------------------------------
         * Webフォントの読み込み
         * ----------------------------------------- */
        @font-face {
            font-family: 'Font_lttl3-Regular';
            src: url('Font_lttl3-Regular.ttf') format('truetype');
            font-display: swap;
        }

        /* -----------------------------------------
         * 基本スタイル設定
         * ----------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* -----------------------------------------
         * ヘッダーエリア
         * ----------------------------------------- */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .header-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 24px;
        }

        /* -----------------------------------------
         * 各種共通ボタン
         * ----------------------------------------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: var(--accent-green);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
        }

        .btn-success:hover {
            background-color: var(--accent-green-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* -----------------------------------------
         * メインコンテンツグリッド
         * ----------------------------------------- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* -----------------------------------------
         * 設定コントロールパネル (左側)
         * ----------------------------------------- */
        .control-panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: var(--shadow-md);
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #a5b4fc;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .form-group label span {
            color: var(--text-primary);
            font-family: monospace;
        }

        /* 入力フォーム類 */
        textarea.text-input {
            width: 100%;
            height: 120px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea.text-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* スライダー */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        /* カラーピッカー周り */
        .color-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--border-color);
            border-radius: 50%;
        }

        /* チェックボックス */
        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 配置ボタン（左、中央、右） */
        .align-group {
            display: flex;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 3px;
        }

        .align-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .align-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* -----------------------------------------
         * リアルタイムプレビューパネル (右側)
         * ----------------------------------------- */
        .preview-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 40px;
        }

        /* スクロール領域を確保するラッパー */
        .preview-wrapper {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: auto; /* コンテンツがはみ出た際にスクロール可能にする */
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d121f;
            box-shadow: var(--shadow-md);
        }

        /* プレビュー本体 */
        .preview-container {
            min-width: 100%;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        /* 背景透過時（チェッカーボード柄） */
        .checkerboard {
            background-color: #111726;
            background-image: 
                linear-gradient(45deg, #070a12 25%, transparent 25%), 
                linear-gradient(-45deg, #070a12 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #070a12 75%), 
                linear-gradient(-45deg, transparent 75%, #070a12 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* プレビューテキスト */
        .preview-text {
            font-family: 'Font_lttl3-Regular', sans-serif;
            white-space: pre-wrap; /* 改行を保持 */
            word-break: break-all;
        }

        /* -----------------------------------------
         * フッター
         * ----------------------------------------- */
        footer {
            text-align: center;
            margin-top: 80px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. ヘッダー・紹介エリア -->
    <header>
        <h1 class="header-title">Font_lttl3-Regular</h1>
        <p class="header-desc">
            このフォントは、ラタタラ語の文字を入力するためのフォントです。
        </p>
        <!-- ダウンロード用のリンクを配置 -->
        <a href="Font_lttl3-Regular.ttf" download="Font_lttl3-Regular.ttf" class="btn btn-primary">
            <!-- ダウンロードSVGアイコン -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            フォントをダウンロード (.ttf)
        </a>
    </header>

    <div class="main-grid">
        <!-- 3. 詳細な書式設定パネル -->
        <div class="control-panel">
            <div class="panel-section">
                <h2 class="section-title">お試し入力</h2>
                <div class="form-group">
                    <textarea id="textInput" class="text-input" placeholder="ここに入力した文字が即座に反映されます...">latatalot</textarea>
                </div>
            </div>

            <div class="panel-section">
                <h2 class="section-title">書式設定</h2>
                
                <!-- フォントサイズ -->
                <div class="form-group">
                    <label for="fontSizeInput">フォントサイズ <span id="fontSizeVal">36px</span></label>
                    <input type="range" id="fontSizeInput" min="12" max="120" value="36">
                </div>

                <!-- 文字間隔 -->
                <div class="form-group">
                    <label for="letterSpacingInput">文字間隔 <span id="letterSpacingVal">2px</span></label>
                    <input type="range" id="letterSpacingInput" min="-5" max="30" value="2">
                </div>

                <!-- 行間 -->
                <div class="form-group">
                    <label for="lineHeightInput">行間 (行送り) <span id="lineHeightVal">1.5</span></label>
                    <input type="range" id="lineHeightInput" min="0.8" max="2.5" step="0.1" value="1.5">
                </div>

                <!-- 余白/パディング -->
                <div class="form-group">
                    <label for="paddingInput">画像の余白 (パディング) <span id="paddingVal">40px</span></label>
                    <input type="range" id="paddingInput" min="0" max="100" value="40">
                </div>

                <!-- テキストの配置 -->
                <div class="form-group">
                    <label>テキストの配置</label>
                    <div class="align-group">
                        <button class="align-btn" data-align="left">左寄せ</button>
                        <button class="align-btn active" data-align="center">中央寄せ</button>
                        <button class="align-btn" data-align="right">右寄せ</button>
                    </div>
                </div>

                <!-- 色・背景設定 -->
                <div class="form-group">
                    <label>カラー設定</label>
                    <div class="color-row">
                        <div class="color-picker-group">
                            <input type="color" id="textColorInput" value="#f8fafc">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">文字色</span>
                        </div>
                        <div class="color-picker-group">
                            <input type="color" id="bgColorInput" value="#131c2e">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">背景色</span>
                        </div>
                    </div>
                </div>

                <!-- 背景の透過切り替え -->
                <div class="form-group" style="margin-top: 5px;">
                    <label class="checkbox-label" for="useBgInput">
                        <input type="checkbox" id="useBgInput" checked>
                        背景色を有効にする (オフで透過PNG)
                    </label>
                </div>
            </div>

            <!-- 4. 画像化・ダウンロード機能 -->
            <div class="panel-section" style="margin-top: 10px;">
                <button id="btnSave" class="btn btn-success">
                    <!-- 画像保存SVGアイコン -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    PNG画像として保存
                </button>
            </div>
        </div>

        <!-- 2. お試し入力・プレビューエリア (右側) -->
        <div class="preview-panel">
            <h2 class="section-title" style="border: none; padding-left: 0; margin-bottom: -5px;">リアルタイムプレビュー</h2>
            <div class="preview-wrapper">
                <div id="previewContainer" class="preview-container">
                    <div id="previewText" class="preview-text"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Font_lttl3-Regular. All Rights Reserved.</p>
    </footer>
</div>

<!-- -----------------------------------------
 * JavaScript実装
 * ----------------------------------------- -->
<script>
    // 各種DOM要素の取得
    const textInput = document.getElementById('textInput');
    const fontSizeInput = document.getElementById('fontSizeInput');
    const fontSizeVal = document.getElementById('fontSizeVal');
    const letterSpacingInput = document.getElementById('letterSpacingInput');
    const letterSpacingVal = document.getElementById('letterSpacingVal');
    const lineHeightInput = document.getElementById('lineHeightInput');
    const lineHeightVal = document.getElementById('lineHeightVal');
    const paddingInput = document.getElementById('paddingInput');
    const paddingVal = document.getElementById('paddingVal');
    const textColorInput = document.getElementById('textColorInput');
    const bgColorInput = document.getElementById('bgColorInput');
    const useBgInput = document.getElementById('useBgInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewText = document.getElementById('previewText');
    const btnSave = document.getElementById('btnSave');

    // テキスト配置用のステート管理 (デフォルトは中央寄せ)
    let currentAlign = 'center';
    const alignButtons = document.querySelectorAll('.align-btn');

    // 配置ボタンのクリックイベント設定
    alignButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            alignButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAlign = btn.dataset.align;
            updatePreview();
        });
    });

    // 各コントロールの入力を監視してプレビューに即座に反映
    const inputs = [textInput, fontSizeInput, letterSpacingInput, lineHeightInput, paddingInput, textColorInput, bgColorInput, useBgInput];
    inputs.forEach(input => {
        input.addEventListener('input', updatePreview);
    });

    /**
     * Web上のプレビューエリアを更新する関数
     */
    function updatePreview() {
        const text = textInput.value || textInput.placeholder;
        const fontSize = fontSizeInput.value;
        const letterSpacing = letterSpacingInput.value;
        const lineHeight = lineHeightInput.value;
        const padding = paddingInput.value;
        const textColor = textColorInput.value;
        const bgColor = bgColorInput.value;
        const useBg = useBgInput.checked;

        // パネル上の各コントロール右側の数値テキストを更新
        fontSizeVal.textContent = fontSize + 'px';
        letterSpacingVal.textContent = letterSpacing + 'px';
        lineHeightVal.textContent = lineHeight;
        paddingVal.textContent = padding + 'px';

        // プレビューテキストのインラインCSSスタイリングを直接変更
        previewText.textContent = text;
        previewText.style.fontFamily = "'Font_lttl3-Regular', sans-serif";
        previewText.style.fontSize = fontSize + 'px';
        previewText.style.letterSpacing = letterSpacing + 'px';
        previewText.style.lineHeight = lineHeight;
        previewText.style.textAlign = currentAlign;
        previewText.style.color = textColor;

        // 背景色設定と、透過時チェッカーボードクラスの付与/剥奪
        previewContainer.style.padding = padding + 'px';
        if (useBg) {
            previewContainer.classList.remove('checkerboard');
            previewContainer.style.backgroundColor = bgColor;
        } else {
            previewContainer.classList.add('checkerboard');
            previewContainer.style.backgroundColor = 'transparent';
        }
    }

    /**
     * Canvas API 用テキスト幅計測ヘルパー (letterSpacing 非対応ブラウザ用フォールバック付)
     */
    function measureTextWidth(ctx, text, spacing) {
        if ('letterSpacing' in ctx) {
            ctx.letterSpacing = `${spacing}px`;
            return ctx.measureText(text).width;
        } else {
            // letterSpacingをサポートしていない古い環境向けの1文字ずつ測定する計算
            let width = 0;
            for (let i = 0; i < text.length; i++) {
                width += ctx.measureText(text[i]).width;
                if (i < text.length - 1) {
                    width += spacing;
                }
            }
            return width;
        }
    }

    /**
     * Canvas API 用 1行分のテキスト描画処理 (letterSpacing 非対応ブラウザ用フォールバック付)
     */
    function drawTextLine(ctx, text, x, y, spacing) {
        if ('letterSpacing' in ctx) {
            ctx.letterSpacing = `${spacing}px`;
            ctx.fillText(text, x, y);
        } else {
            // letterSpacing非対応時: 各文字の幅を測定しつつ座標をずらし、1文字ずつ描画
            let currentX = x;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                ctx.fillText(char, currentX, y);
                currentX += ctx.measureText(char).width + spacing;
            }
        }
    }

    /**
     * Canvasを生成し、テキストを美しく描画した上でPNGとして書き出す処理
     */
    function generateAndDownloadImage() {
        const text = textInput.value || textInput.placeholder;
        const lines = text.split('\n');
        
        const fs = parseInt(fontSizeInput.value, 10);
        const ls = parseInt(letterSpacingInput.value, 10);
        const lh = parseFloat(lineHeightInput.value);
        const pad = parseInt(paddingInput.value, 10);
        const textColor = textColorInput.value;
        const bgColor = bgColorInput.value;
        const useBg = useBgInput.checked;

        // --- 測定処理用の一時的なダミーCanvas ---
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.font = `${fs}px "Font_lttl3-Regular"`;

        // 複数行のうち「もっとも幅が大きい行」を検出し、その幅をベースにする
        let maxLineWidth = 0;
        lines.forEach(line => {
            const width = measureTextWidth(tempCtx, line, ls);
            if (width > maxLineWidth) {
                maxLineWidth = width;
            }
        });

        // テキストが空だった場合のフォールバックサイズ
        if (maxLineWidth === 0) maxLineWidth = 100;

        // 計算した文字領域の幅と、行間・フォントサイズから高さを弾き出す
        const canvasWidth = Math.ceil(maxLineWidth + pad * 2);
        const lineHeightPx = fs * lh;
        // 高さ = ((行数 - 1) * 行送り高さ) + 最終行の文字自身の高さ + 上下パディング
        const canvasHeight = Math.ceil((lines.length - 1) * lineHeightPx + fs + pad * 2);

        // --- 本番描画用Canvas ---
        const canvas = document.createElement('canvas');
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        const ctx = canvas.getContext('2d');

        // 背景色の適用（透過チェック時は塗りつぶさない）
        if (useBg) {
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // テキスト設定の適用
        ctx.fillStyle = textColor;
        ctx.font = `${fs}px "Font_lttl3-Regular"`;
        ctx.textBaseline = 'top'; // 計算が容易なように左上をベースラインにする

        // 行ごとにテキストを配置設定に合わせて描画
        lines.forEach((line, index) => {
            const lineWidth = measureTextWidth(ctx, line, ls);
            let x = pad;

            // 文字寄せによるX位置の制御
            if (currentAlign === 'center') {
                x = pad + (maxLineWidth - lineWidth) / 2;
            } else if (currentAlign === 'right') {
                x = pad + (maxLineWidth - lineWidth);
            }

            // 行間を考慮したY座標
            const y = pad + index * lineHeightPx;
            drawTextLine(ctx, line, x, y, ls);
        });

        // 画像データの保存・ダウンロードリンクの発行
        const link = document.createElement('a');
        link.download = `font_lttl3_preview_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // 画像保存ボタンへのバインド
    btnSave.addEventListener('click', generateAndDownloadImage);

    // ページの初期ロード時の挙動
    window.addEventListener('DOMContentLoaded', () => {
        // フォントファイルのロードが完全に完了するのを待ってから描画
        document.fonts.ready.then(() => {
            updatePreview();
        }).catch(() => {
            // 例外的なエラーが発生した場合でも一度プレビューを実行
            updatePreview();
        });
    });
</script>

</body>
</html>
